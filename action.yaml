name: prek-action
description: Run pre-commit hooks using prek
inputs:
  extra-args:
    description: Extra options to pass to `prek run`, appended after `--show-diff-on-failure --color=always`
    required: false
    default: '--all-files'
  extra_args:
    description: Options to pass to `prek run` (deprecated, use extra-args)
    required: false
  install-only:
    description: Only install prek, do not run it
    required: false
    default: 'false'
  prek-version:
    description: Version of prek to install (for example `0.2.1` or `latest`)
    required: false
    default: 'latest'
  working-directory:
    description: The working directory to run prek in
    required: false
    default: '.'
  token:
    description: GitHub token to avoid API rate limiting when resolving `latest`
    required: false
    default: ${{ github.token }}
outputs:
  prek-version:
    description: The version of prek that was installed
runs:
  using: node24
  main: dist/index.js
  post: dist/post/index.js
branding:
  icon: git-commit
  color: orange
