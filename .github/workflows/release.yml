name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without the leading v
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Rebuild dist
        run: npm run bundle

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Plan release
        id: plan
        run: |
          release_tag="${INPUT_VERSION#v}"
          release_tag="v${release_tag}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid version input: ${INPUT_VERSION}" >&2
            exit 1
          fi
          if git show-ref --tags --verify --quiet "refs/tags/$release_tag"; then
            echo "Tag already exists: ${release_tag}" >&2
            exit 1
          fi
          is_prerelease=false
          if [[ "$release_tag" == *-* ]]; then
            is_prerelease=true
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"
          echo "Planned release:"
          echo "  tag: ${release_tag}"
          echo "  prerelease: ${is_prerelease}"

      - name: Create GitHub release
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.release_tag }}
          IS_PRERELEASE: ${{ steps.plan.outputs.is_prerelease }}
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--target "${GITHUB_SHA}" --generate-notes)
          if [[ "${IS_PRERELEASE}" == 'true' ]]; then
            args+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" "${args[@]}"

      - name: Move major and minor tags
        if: ${{ steps.plan.outputs.is_prerelease != 'true' }}
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.release_tag }}
        run: |
          major="${RELEASE_TAG%%.*}"
          minor="${RELEASE_TAG%.*}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -fa "$major" -m "$major"
          git tag -fa "$minor" -m "$minor"
          git push origin "refs/tags/$major" "refs/tags/$minor" --force
